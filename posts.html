<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kaan Party</title>

<link rel="icon" href="icon.png">

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<style>
body{
  background:#f6f1e7;
  font-family:Arial, Helvetica, sans-serif;
  margin:20px;
  padding-top:60px;
}

h1{
  color:#800;
}

.top-panel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#800;
  border-bottom:2px solid #5f0000;
  padding:8px 10px;
  box-sizing:border-box;
  z-index:99999;
  text-align:center;
}

.top-panel a{
  color:#f6f1e7;
  text-decoration:none;
  font-weight:bold;
  margin:0 8px;
  font-size:14px;
}

.top-panel a:hover{
  text-decoration:underline;
}

.post-id{
  font-family:monospace;
  font-weight:bold;
  color:#0057ff;
  margin-left:8px;
}

.top-ad{
  text-align:center;
  margin-bottom:15px;
}

.top-ad img{
  display:block;
  margin:0 auto;
}

.nav{
  margin-bottom:15px;
}

.nav a{
  color:#800;
  text-decoration:none;
  font-weight:bold;
  margin-right:10px;
}

.post-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.box{
  background:#f0e0d6;
  border:1px solid #800;
  padding:12px;
  width:100%;
  max-width:1400px;
  margin-bottom:15px;
  box-sizing:border-box;
  overflow-x:auto;
}

.post-header{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}

.user-icon{
  display:block;
  margin:0;
}

input,textarea{
  width:100%;
  border:1px solid #d9bfb7;
  padding:5px;
  margin-top:5px;
  box-sizing:border-box;
}

textarea{
  height:80px;
}

button{
  margin-top:8px;
  background:#d6daf0;
  border:1px solid #b7c5d9;
  padding:5px 10px;
  cursor:pointer;
}

button:hover{
  filter:brightness(0.96);
}

.post-image{
  max-width:320px;
  margin-top:5px;
}

.post-video{
  max-width:320px;
  margin-top:5px;
}

.green{
  color:#789922;
}

.blue{
  color:#0057ff;
}

.orange{
  color:#f6750b;
}

.reply-link{
  color:#800;
  font-weight:bold;
}

.review-bar{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

.review-btn{
  display:flex;
  align-items:center;
  gap:5px;
  background:#d6daf0;
  border:1px solid #b7c5d9;
  padding:4px 8px;
  cursor:pointer;
}

.review-btn img{
  width:auto;
  height:auto;
  margin:0;
}

.replies{
  margin-top:10px;
  overflow-x:auto;
}

.reply-item{
  min-width:260px;
  max-width:100%;
  box-sizing:border-box;
  word-wrap:break-word;
}

.side-gif img{
  display:block;
  margin:0;
}

#server-status{
  margin-bottom:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top-panel">
  <a href="index.html">Home</a>
  <a href="images_archive.html">/i/</a>
  <a href="videos_archive.html">/v/</a>
  <a href="kaanjak.html">/kaan/</a>
  <a href="geo.html">/geo/</a>
</div>

<div class="top-ad">
  <img src="kaan1.png">
</div>

<h1>/p/ - Posts</h1>

<div class="nav">
  <a href="index.html">[Return]</a>
  <a href="videos_archive.html">/v/ - Videos</a>
  <a href="images_archive.html">/i/ - Images</a>
  <a href="geo.html">/geo/ - GeoCities</a>
  <a href="kaanjak.html">/kaan/ - Kaanjaks</a>
</div>

<div id="server-status">
Checking server...
</div>

<div class="post-row">

  <div class="box">

    <h1>Create Post</h1>

    <input id="subject" placeholder="subject (optional)">

    <textarea id="desc" placeholder="write something..."></textarea>

    <input type="file" id="file">

    <button onclick="submitPost()">[Post]</button>

  </div>

  <div class="side-gif">
    <img src="ad.gif">
  </div>

</div>

<div id="posts"></div>

<script>
const pb = new PocketBase('https://kaan-partybase.onrender.com');

const ADMIN_IDS = [
  "admin123"
];

const postSound = new Audio('post.wav');
postSound.volume = 0.7;

let isLoading = false;

/* SERVER STATUS */
async function updateServerStatus(){

  const status =
    document.getElementById("server-status");

  try{

    await pb.health.check();

    status.innerHTML = `
      <span style="color:lime;">
      ● SERVER ONLINE
      </span>
    `;

  }catch{

    status.innerHTML = `
      <span style="color:red;">
      ● SERVER OFFLINE
      </span>
    `;
  }
}

/* USER ID */
function getUserId(){

  let id =
    localStorage.getItem('user_id');

  if(!id){

    id = crypto.randomUUID().slice(0,8);

    localStorage.setItem('user_id',id);
  }

  return id;
}

/* USERNAME */
function getUsername(userId){

  if(ADMIN_IDS.includes(userId)){
    return "Feraljak";
  }

  return "Chud";
}

/* DATE */
function formatDate(dateString){

  if(!dateString){
    return "Just now";
  }

  const d = new Date(dateString);

  if(isNaN(d.getTime())){
    return "Just now";
  }

  const pad = n =>
    String(n).padStart(2,'0');

  const days = [
    'Sun','Mon','Tue',
    'Wed','Thu','Fri','Sat'
  ];

  return `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${d.getFullYear()}(${days[d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* TEXT */
function formatText(text){

  if(!text) return '';

  return text.split('\n').map(line => {

    if(line.startsWith('>>')){

      return `
        <span class="reply-link">
        ${line}
        </span>
      `;
    }

    if(line.startsWith('>')){
      return `<span class="green">${line}</span>`;
    }

    if(line.startsWith('<')){
      return `<span class="orange">${line}</span>`;
    }

    if(line.startsWith('#')){
      return `<span class="blue">${line}</span>`;
    }

    return line;

  }).join('<br>');
}

/* REPLY */
function replyTo(postId){

  const desc =
    document.getElementById('desc');

  desc.value += `>>${postId}\n`;

  desc.focus();

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });
}

/* FILE */
function renderFile(post){

  if(!post.file){
    return '';
  }

  const fileUrl =
    `https://kaan-partybase.onrender.com/api/files/${post.collectionId}/${post.id}/${post.file}`;

  if(post.file.match(/\.(mp4|webm|mov)$/i)){

    return `
      <video
        class="post-video"
        controls
        preload="metadata">

        <source src="${fileUrl}">
      </video>
    `;
  }

  return `
    <img
      class="post-image"
      src="${fileUrl}">
  `;
}

/* POST */
async function submitPost(){

  const subjectInput =
    document.getElementById('subject');

  const descInput =
    document.getElementById('desc');

  const fileInput =
    document.getElementById('file');

  const subject =
    subjectInput.value.trim();

  const desc =
    descInput.value.trim();

  if(!subject &&
     !desc &&
     fileInput.files.length === 0){

    alert('Write something or upload a file.');
    return;
  }

  postSound.currentTime = 0;
  postSound.play();

  const formData = new FormData();

  formData.append(
    'post_id',
    crypto.randomUUID().slice(0,8)
  );

  formData.append(
    'user_id',
    getUserId()
  );

  formData.append(
    'subject',
    subject
  );

  formData.append(
    'description',
    desc
  );

  formData.append(
    'likes',
    0
  );

  formData.append(
    'dislikes',
    0
  );

  if(fileInput.files.length > 0){

    formData.append(
      'file',
      fileInput.files[0]
    );
  }

  try{

    await pb.collection('posts')
      .create(formData);

    subjectInput.value = '';
    descInput.value = '';
    fileInput.value = '';

    await loadPosts();

  }catch(err){

    console.log(err);

    alert('Post failed');
  }
}

/* DELETE */
async function deletePost(id){

  if(!confirm("Delete post?")){
    return;
  }

  try{

    await pb.collection('posts')
      .delete(id);

    const el =
      document.querySelector(
        `[data-db-id="${id}"]`
      );

    if(el){
      el.remove();
    }

  }catch(err){

    console.log(err);
  }
}

/* VOTE */
async function vote(postId,type){

  let votes =
    JSON.parse(
      localStorage.getItem('votes') || '{}'
    );

  const oldVote =
    votes[postId] || null;

  if(oldVote === type){
    return;
  }

  const post =
    await pb.collection('posts')
      .getOne(postId);

  let likes =
    post.likes || 0;

  let dislikes =
    post.dislikes || 0;

  if(type === 'like'){

    likes++;

    if(oldVote === 'dislike'){
      dislikes--;
    }
  }

  if(type === 'dislike'){

    dislikes++;

    if(oldVote === 'like'){
      likes--;
    }
  }

  await pb.collection('posts')
    .update(postId,{
      likes,
      dislikes
    });

  votes[postId] = type;

  localStorage.setItem(
    'votes',
    JSON.stringify(votes)
  );

  updateVoteDisplay(
    postId,
    likes,
    dislikes
  );
}

/* UPDATE VOTES */
function updateVoteDisplay(
  postId,
  likes,
  dislikes
){

  document
    .querySelectorAll(
      `[data-db-id="${postId}"]`
    )
    .forEach(el => {

      const likeSpan =
        el.querySelector('.like-count');

      const dislikeSpan =
        el.querySelector('.dislike-count');

      if(likeSpan){
        likeSpan.textContent = likes;
      }

      if(dislikeSpan){
        dislikeSpan.textContent = dislikes;
      }

    });
}

/* REPLY HTML */
function createReplyHTML(
  post,
  isAdmin,
  depth
){

  const lines =
    (post.description || '')
    .split('\n');

  const safeDepth =
    Math.min(depth, 6);

  const offset =
    safeDepth * 18;

  return `
    <div
      class="reply-item"
      data-depth="${safeDepth}"
      id="reply-${post.post_id}"
      data-db-id="${post.id}"
      style="
      margin-top:8px;
      margin-left:${offset}px;
      padding:8px;
      border:1px solid #800;
      background:#e8d5c8;
      max-width:100%;
      overflow-x:auto;
      box-sizing:border-box;
      ">

      <div
      style="
      font-size:12px;
      margin-bottom:5px;
      word-break:break-word;">

        <span
        style="
        color:#800;
        font-weight:bold;">

        ${getUsername(post.user_id)}

        </span>

        <span class="post-id">
        #${post.post_id}
        </span>

        <span
        style="
        color:#666;
        margin-left:5px;">

        ${formatDate(post.created)}

        </span>

      </div>

      <div style="word-break:break-word;">
        ${formatText(
          lines.slice(1).join('\n')
        )}
      </div>

      ${renderFile(post)}

      <div class="review-bar">

        <button
        class="review-btn"
        onclick="vote('${post.id}','like')">

          <img src="accept.png">

          <span class="like-count">
          ${post.likes || 0}
          </span>

        </button>

        <button
        class="review-btn"
        onclick="vote('${post.id}','dislike')">

          <img src="cross.png">

          <span class="dislike-count">
          ${post.dislikes || 0}
          </span>

        </button>

        ${isAdmin ? `

          <button
          class="review-btn"
          onclick="deletePost('${post.id}')">

          Delete

          </button>

        ` : ''}

      </div>

      <div
      class="replies"
      id="replies-${post.post_id}">
      </div>

    </div>
  `;
}

/* LOAD POSTS */
async function loadPosts(){

  if(isLoading){
    return;
  }

  isLoading = true;

  try{

    const records =
      await pb.collection('posts')
      .getFullList({
        sort:'created'
      });

    const container =
      document.getElementById('posts');

    const isAdmin =
      ADMIN_IDS.includes(getUserId());

    /* MAIN POSTS */
    records.forEach(post => {

      const lines =
        (post.description || '')
        .split('\n');

      const firstLine =
        lines[0] || '';

      if(firstLine.startsWith('>>')){
        return;
      }

      const exists =
        document.getElementById(
          `post-${post.post_id}`
        );

      if(exists){

        updateVoteDisplay(
          post.id,
          post.likes || 0,
          post.dislikes || 0
        );

        return;
      }

      const div =
        document.createElement('div');

      div.className = 'box';

      div.id =
        `post-${post.post_id}`;

      div.setAttribute(
        'data-db-id',
        post.id
      );

      div.innerHTML = `

        <div class="post-header">

          <img
          class="user-icon"
          src="user.png">

          <div>

            <span
            style="
            color:#800;
            font-weight:bold;">

            ${getUsername(post.user_id)}

            </span>

            <span class="post-id">
            #${post.post_id}
            </span>

            <span
            style="
            color:#666;
            font-size:12px;
            margin-left:8px;">

            ${formatDate(post.created)}

            </span>

          </div>

        </div>

        ${post.subject
          ? `<p><strong>${post.subject}</strong></p>`
          : ''
        }

        <div class="post-text">
          ${formatText(post.description)}
        </div>

        ${renderFile(post)}

        <div class="review-bar">

          <button
          class="review-btn"
          onclick="vote('${post.id}','like')">

            <img src="accept.png">

            <span class="like-count">
            ${post.likes || 0}
            </span>

          </button>

          <button
          class="review-btn"
          onclick="vote('${post.id}','dislike')">

            <img src="cross.png">

            <span class="dislike-count">
            ${post.dislikes || 0}
            </span>

          </button>

          <button
          class="review-btn"
          onclick="replyTo('${post.post_id}')">

            Reply

          </button>

          ${isAdmin ? `

            <button
            class="review-btn"
            onclick="deletePost('${post.id}')">

            Delete

            </button>

          ` : ''}

        </div>

        <div
        class="replies"
        id="replies-${post.post_id}">
        </div>
      `;

      container.prepend(div);

    });

    /* REPLIES */
    records.forEach(post => {

      const lines =
        (post.description || '')
        .split('\n');

      const firstLine =
        lines[0] || '';

      if(!firstLine.startsWith('>>')){
        return;
      }

      const targetId =
        firstLine.replace('>>','').trim();

      const replyBox =
        document.getElementById(
          `replies-${targetId}`
        );

      if(!replyBox){
        return;
      }

      const existingReply =
        document.getElementById(
          `reply-${post.post_id}`
        );

      if(existingReply){

        updateVoteDisplay(
          post.id,
          post.likes || 0,
          post.dislikes || 0
        );

        return;
      }

      const parentReply =
        replyBox.closest('.reply-item');

      let depth = 1;

      if(parentReply){

        depth =
          parseInt(
            parentReply.dataset.depth || 1
          ) + 1;
      }

      replyBox.innerHTML +=
        createReplyHTML(
          post,
          isAdmin,
          depth
        );

    });

  }catch(err){

    console.log(err);
  }

  isLoading = false;
}

/* GLOBAL */
window.submitPost = submitPost;
window.vote = vote;
window.replyTo = replyTo;
window.deletePost = deletePost;

/* START */
updateServerStatus();

setInterval(
  updateServerStatus,
  3000
);

loadPosts();

setInterval(
  loadPosts,
  5000
);
</script>

</body>
</html>
