<script>
  function toggleFile(button) {
    const img = button.nextElementSibling;

    if (img.style.maxWidth === "150px" || img.style.maxWidth === "") {
      img.style.maxWidth = "500px";
    } else {
      img.style.maxWidth = "150px";
    }
  }

  function goHome() {
    window.location.href = "index.html";
  }

  async function loadInfo(img, id) {
    const info = document.getElementById(id);
    if (!info) return;

    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      const size = (blob.size / 1024).toFixed(1);
      const width = img.naturalWidth;
      const height = img.naturalHeight;
      const name = img.src.split('/').pop();

      info.textContent =
        `File: ${name} (${size} KB, ${width}x${height})`;
    } catch {
      info.textContent = "Failed to load info";
    }
  }
</script>
