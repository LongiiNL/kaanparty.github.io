<script>
  function toggleVideo(button) {
    const vid = button.nextElementSibling;

    if (vid.style.maxWidth === "150px" || vid.style.maxWidth === "") {
      vid.style.maxWidth = "500px";
      vid.play();
    } else {
      vid.style.maxWidth = "150px";
      vid.pause();
    }
  }

  function goHome() {
    window.location.href = "index.html";
  }

  function loadVideoInfo(video, id) {
    const info = document.getElementById(id);

    if (!info) return;

    const width = video.videoWidth;
    const height = video.videoHeight;
    const duration = video.duration ? video.duration.toFixed(1) : "?";
    const name = video.src.split('/').pop();

    info.textContent =
      `File: ${name} (${width}x${height}, ${duration}s)`;
  }
</script>
