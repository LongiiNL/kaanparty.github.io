<script>
  function toggleMedia(button) {
    const el = button.nextElementSibling;

    if (el.style.maxWidth === "150px" || el.style.maxWidth === "") {
      el.style.maxWidth = "500px";
      if (el.tagName === "VIDEO") el.play();
    } else {
      el.style.maxWidth = "150px";
      if (el.tagName === "VIDEO") el.pause();
    }
  }

  async function loadImageInfo(img, id) {
    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      const size = (blob.size / 1024).toFixed(1);
      const name = img.src.split('/').pop();

      document.getElementById(id).textContent =
        `File: ${name} (${size} KB, ${img.naturalWidth}x${img.naturalHeight})`;
    } catch {
      document.getElementById(id).textContent = "Failed to load info";
    }
  }

  function loadVideoInfo(video, id) {
    const name = video.src.split('/').pop();
    const duration = video.duration.toFixed(1);

    document.getElementById(id).textContent =
      `File: ${name} (${video.videoWidth}x${video.videoHeight}, ${duration}s)`;
  }
</script>
